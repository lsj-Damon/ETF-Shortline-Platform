version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: etf-shortline-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: etf_shortline
      POSTGRES_USER: etf
      POSTGRES_PASSWORD: etf123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: etf-shortline-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.example
    environment:
      POSTGRES_HOST: postgres
      DATA_DIR: /data
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/data
    depends_on:
      - postgres

  frontend:
    image: node:20-alpine
    container_name: etf-shortline-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

volumes:
  pgdata:
